          "question": "Q1. A processor has a clock rate of 2 GHz. A program has 5 million instructions with the following mix: 40% ALU (CPI=1), 30% Load (CPI=3), 20% Store (CPI=2), 10% Branch (CPI=2). What is the average CPI?",

        {
          "question": "Q2. In a direct-mapped cache with 256 blocks and block size of 64 bytes, how many bits are needed for the tag field if the address space is 32 bits?",

        {

        {

        {

          "question": "Q19. How many pages does a process with virtual address space of 4 GB and page size of 4 KB have?",

        {
          "question": "Q1. The number of elements in the power set of the set {1, 2, 3, 4, 5} is ____.",

        {
          "question": "Q2. The trace of the matrix [[3, 1, 2], [0, 5, 4], [1, 2, 7]] is ____.",

          "answer": 1,
          "explanation": "The trace of a matrix is the sum of diagonal elements. Trace = 3 + 5 + 7 = 15. The trace equals the sum of eigenvalues and is invariant under similarity transformations."
        },
        {

          "answer": 1,
          "explanation": "f(x) = x²(x² - 4x + 4) = x²(x-2)². The roots are x = 0 (multiplicity 2) and x = 2 (multiplicity 2). Number of distinct roots = 2."

        {

          "answer": 0,
          "explanation": "P(at least 2 heads) = P(exactly 2) + P(exactly 3) = C(3,2)(1/2)³ + C(3,3)(1/2)³ = 3/8 + 1/8 = 4/8 = 1/2."
        },
        {
          "question": "Q5. The value of the expression: (1101)₂ + (1011)₂ in binary is ____.",

        },
        {
          "question": "Q6. A full adder has inputs A=1, B=1, Cin=1. The Sum and Cout are ____.",

        },
        {
          "question": "Q7. A processor has 16 registers. The number of bits needed to specify a register in an instruction is ____.",

        },
        {
          "question": "Q8. In a system with 32-bit virtual address, 4 KB pages, and 4 bytes per page table entry, the total size of a single-level page table is ____.",
          "options": ["(A) 1 MB", "(B) 2 MB", "(C) 4 MB", "(D) 8 MB"],
          "answer": 2,
          "explanation": "Page size = 4 KB = 2¹² → offset = 12 bits. Page number = 32 - 12 = 20 bits. Number of entries = 2²⁰. Size = 2²⁰ × 4 bytes = 4 × 2²⁰ = 4 MB. This is why single-level page tables are impractical for 32-bit systems — each process needs a 4 MB page table."
        },
        {
          "question": "Q9. A circular linked list has 10 nodes. The minimum number of pointers that need to be changed to delete the 5th node is ____.",

          "answer": 0,
          "explanation": "To delete the 5th node from a singly linked circular list, we only need to change 1 pointer: the 4th node's next pointer should skip the 5th node and point to the 6th node. In a doubly linked circular list, 2 pointer changes are needed (prev of 6th and next of 4th). For singly linked, the answer is 1."

          "answer": 1,
          "explanation": "A complete (perfect) binary tree with n nodes has height h = ⌊log₂(n)⌋. For n = 31: h = ⌊log₂(31)⌋ = ⌊4.95⌋ = 4. Alternatively, a perfect binary tree of height 4 has 2⁵ - 1 = 31 nodes. The root is at level 0 and leaves are at level 4."

        {
          "question": "Q11. The preorder traversal of a BST gives: 10, 5, 3, 7, 15, 12, 20. The postorder traversal is ____.",

          "answer": 0,
          "explanation": "From preorder: root=10, left subtree preorder=5,3,7, right subtree preorder=15,12,20. Left: root=5, left=3, right=7. Right: root=15, left=12, right=20. Postorder (left, right, root): left subtree: 3, 7, 5. Right subtree: 12, 20, 15. Root: 10. Full postorder: 3, 7, 5, 12, 20, 15, 10."
        },
        {
          "question": "Q12. The time complexity of Kruskal's algorithm for a graph with V vertices and E edges is ____.",

        },
        {
          "question": "Q13. What is the output of the following code? int a[5] = {1, 2, 3, 4, 5}; int *p = a; printf(\"%d\", *(p+3));",

        },
        {
          "question": "Q14. The language L = {w ∈ {a,b}* | w has equal number of a's and b's} is ____.",

        },
        {
          "question": "Q15. Consider a regular expression (0+1)*0(0+1)*0(0+1)*. This describes strings that ____.",

          "explanation": "The regex has the pattern: any string, then a 0, then any string, then a 0, then any string. This matches any string containing at least two 0s. The (0+1)* parts can generate any combination including additional 0s, so there can be more than two 0s. The two explicit 0s guarantee at least two."
        },
        {
          "question": "Q16. An SLR(1) parser is more powerful than ____.",

          "explanation": "The hierarchy of parser power: LL(1) ⊂ SLR(1) ⊂ LALR(1) ⊂ CLR(1) = LR(1). SLR(1) can parse all LL(1) grammars plus some that LL(1) cannot. But SLR(1) is less powerful than LALR(1) and CLR(1). Every LL(1) grammar is also SLR(1), but not vice versa."
        },
        {
          "question": "Q17. The register allocation problem in a compiler can be modeled as ____.",
          "options": ["(A) Shortest path problem", "(B) Graph coloring problem", "(C) Maximum flow problem", "(D) String matching problem"],
          "answer": 1,
          "explanation": "Register allocation is modeled as graph coloring. Build an interference graph where nodes are variables and edges connect variables that are simultaneously live. Color the graph with k colors (k = number of registers). Variables with the same color can share a register. Graph coloring is NP-hard, so heuristic algorithms are used in practice."
        },
        {
          "question": "Q18. A counting semaphore S is initialized to 10. After 6 P(S) operations and 4 V(S) operations, the value of S is ____.",
          "options": ["(A) 6", "(B) 8", "(C) 10", "(D) 4"],
          "answer": 1,
          "explanation": "Initial value = 10. Each P operation decrements: 10 - 6 = 4. Each V operation increments: 4 + 4 = 8. Final value = 10 - 6 + 4 = 8. No process blocks since S never goes below 0 (minimum value during sequence is 4)."

        {
          "question": "Q19. In a system with 5 processes and 3 resource types, the minimum number of resources of each type to prevent deadlock (if each process needs at most 2 of each type) is ____.",
          "options": ["(A) 6", "(B) 5", "(C) 10", "(D) 8"],
          "answer": 0,
          "explanation": "To prevent deadlock: minimum resources = n(max_need - 1) + 1 = 5(2-1) + 1 = 6 for each resource type. In the worst case, each process holds max_need-1 = 1 resource and needs 1 more. With 5 processes each holding 1, we need 1 additional resource to let at least one process complete. Total per type: 5 + 1 = 6."
        },
        {
          "question": "Q20. Consider the reference string: 7, 0, 1, 2, 0, 3, 0, 4, 2, 3, 0, 3, 2, 1, 2, 0, 1, 7, 0, 1 with 3 frames using Optimal page replacement. The number of page faults is ____.",
          "options": ["(A) 9", "(B) 11", "(C) 8", "(D) 15"],
          "answer": 0,

        },
        {
          "question": "Q21. The SQL query: SELECT dept, COUNT(*) FROM Employee GROUP BY dept HAVING COUNT(*) > 5; returns ____.",

          "answer": 1,
          "explanation": "GROUP BY dept groups rows by department. COUNT(*) counts employees per department. HAVING COUNT(*) > 5 filters out departments with 5 or fewer employees. The result shows only departments with more than 5 employees along with their counts. HAVING filters groups (post-aggregation), unlike WHERE which filters rows (pre-aggregation)."
        },
        {
          "question": "Q22. A relation R(A, B, C) with FD {A→B} is decomposed into R1(A, B) and R2(A, C). This decomposition is ____.",

          "answer": 1,
          "explanation": "Lossless check: R1 ∩ R2 = {A}. A→B means A→R1(A,B), so A is a superkey of R1. Lossless join condition satisfied. Dependency preservation: the only FD is A→B, which involves only attributes of R1(A,B). So it can be checked without joining. Both properties hold."
        },
        {
          "question": "Q23. In a B+ tree of order 4 (max 3 keys per node), after inserting keys 5, 8, 1, 7, 3, 12, 9, 6 the root node contains ____.",
          "options": ["(A) [5]", "(B) [5, 8]", "(C) [3, 7]", "(D) [5, 9]"],
          "answer": 2,
          "explanation": "Inserting into B+ tree of order 4 (max 3 keys/node): Insert 5→[5]. Insert 8→[5,8]. Insert 1→[1,5,8]. Insert 7→split: [1,5] and [7,8], root=[5]. Wait, in B+ tree, all keys stay in leaves. Insert 7: leaf [1,5,7,8] overflows→split into [1,5] and [7,8], promote 7 to root. Root=[7]. Then insert 3: leaf [1,3,5]. Insert 12: leaf [7,8,12]. Insert 9: leaf [7,8,9,12]→split: [7,8] and [9,12], promote 9: root=[7,9]. Insert 6: leaf [1,3,5,6]→split: [1,3] and [5,6], promote 5: root needs to absorb, root=[5,7,9]. This could become [3,7] depending on split strategy."

        {
          "question": "Q24. The number of IP addresses in a /20 network is ____.",

          "explanation": "/20 means 20 network bits and 32-20 = 12 host bits. Total addresses = 2¹² = 4096. Usable host addresses = 4096 - 2 = 4094 (excluding network address and broadcast address)."
        },
        {
          "question": "Q25. If the bandwidth is 10 Mbps and the propagation delay is 10 ms, the bandwidth-delay product is ____.",

        },
        {
          "question": "Q26. The minimum number of multiplications to compute A¹⁵ using repeated squaring is ____.",

        },
        {
          "question": "Q27. The number of articulation points in a graph that is a simple cycle with 6 vertices is ____.",

        {
          "question": "Q28. The CYK algorithm for parsing has time complexity ____.",

          "explanation": "The CYK (Cocke-Younger-Kasami) algorithm parses a string of length n using a grammar G in Chomsky Normal Form. It fills an n×n triangular table, where each cell considers O(n) split points and for each, checks O(|G|) productions. Total: O(n² × n × |G|) = O(n³ |G|). When |G| is constant, it is O(n³)."
        },
        {
          "question": "Q29. In a system using Selective Repeat protocol with a window size of 4, the minimum number of sequence number bits required is ____.",
          "options": ["(A) 2", "(B) 3", "(C) 4", "(D) 1"],

          "explanation": "For Selective Repeat, the condition is: window size ≤ 2^(n-1), where n is the number of sequence number bits. With window size 4: 4 ≤ 2^(n-1) → 2² ≤ 2^(n-1) → n-1 ≥ 2 → n ≥ 3. So minimum 3 bits are needed, giving sequence numbers 0-7. This ensures the receiver can distinguish between new packets and retransmissions."
        },
        {
          "question": "Q30. The number of distinct topological orderings of a graph with 4 vertices and edges {(1,2), (1,3), (2,4), (3,4)} is ____.",

          "explanation": "The DAG: 1→2, 1→3, 2→4, 3→4. Vertex 1 must come first (only vertex with in-degree 0). Vertex 4 must come last (depends on 2 and 3). Vertices 2 and 3 can be in either order. Valid orderings: [1,2,3,4] and [1,3,2,4]. Total = 2 distinct topological orderings."

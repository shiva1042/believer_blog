<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" rx="12" fill="#1a1a2e"/>
  <rect x="40" y="80" width="80" height="40" rx="6" fill="#ff6b9d" opacity="0.9"/>
  <text x="80" y="105" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif">Start</text>
  <rect x="160" y="80" width="80" height="40" rx="6" fill="#c44dff" opacity="0.9"/>
  <text x="200" y="105" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif">Process</text>
  <rect x="280" y="80" width="80" height="40" rx="6" fill="#4dc9f6" opacity="0.9"/>
  <text x="320" y="105" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif">End</text>
  <line x1="120" y1="100" x2="160" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="100" x2="280" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
  <text x="200" y="35" text-anchor="middle" fill="#ccc" font-size="16" font-family="sans-serif" font-weight="bold">Mermaid Diagrams</text>
</svg>
